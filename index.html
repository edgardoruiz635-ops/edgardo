<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiendas Tech EJR | Componentes y Ensamblaje</title>
    <link rel="icon" href="Img/Milogo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="CSS.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="#"><img src="Img/Milogo.jpg" alt="Logo Tech EJR" class="logo-img"></a>
        </div>
        <div class="header-right">
            <button class="login-btn-header">👤 Iniciar Sesión</button>
            <div id="btn-carrito" class="cart-icon-container">
                🛒 <span id="contador">0</span>
            </div>
        </div>
    </header>

    <section class="hero-banner">
        <div class="hero-content">
            <h1>Tiendas Tech EJR</h1>
            <p>Innovación y potencia en cada componente.</p>
            <a href="#product-list" class="btn-ver">Ver Productos</a>
        </div>
    </section>

    <nav class="categories-nav">
        <button class="cat-btn active" onclick="filterItems('INICIO')">Inicio</button>
        <button class="cat-btn" onclick="filterItems('Todos')">Todos</button>
        <button class="cat-btn" onclick="filterItems('PLACAS MADRE')">Placa Madre</button>
        <button class="cat-btn" onclick="filterItems('PROCESADORES')">Procesadores</button>
        <button class="cat-btn" onclick="filterItems('RAM')">RAM</button>
        <button class="cat-btn" onclick="filterItems('CHIPS SSD')">SSD</button>
        <button class="cat-btn" onclick="filterItems('FUENTES')">Fuentes</button>
        <button class="cat-btn" onclick="filterItems('GRAFICAS')">Gráficas</button>
        <button class="cat-btn" onclick="filterItems('REFRIGERACION')">Refrigeración</button>
        <button class="cat-btn" onclick="filterItems('GABINETES')">Gabinetes</button>
        <button class="cat-btn" onclick="filterItems('PERIFERICOS')">Periféricos</button>
    </nav>

    <main class="main-content">
        <section class="inicio-personalizado">
            <div class="fila">
                <div class="col-img"><img src="Img/Imag1.jpg" alt="Equipos Gaming"></div>
                <div class="col-txt">
                    <h2>Potencia de Nueva Generación</h2>
                    <p>En <strong>EJR Tech</strong> ensamblamos los equipos más potentes con configuraciones optimizadas.</p>
                    <button class="btn-ver" onclick="filterItems('Todos')">Ver Equipos</button>
                </div>
            </div>
        </section>

        <section class="products-section">
            <h2 id="cat-title" style="display:none;">Catálogo</h2>
            <div class="products-grid" id="product-list"></div>
        </section>
    </main>

    <aside class="sidebar-cart" id="sidebar-cart">
        <div class="cart-header">
            <h3>TU PEDIDO</h3>
            <button class="close-cart" onclick="toggleCart(false)">✖</button>
        </div>
        <div id="cart-list" class="cart-body"></div>
        <div class="cart-footer">
            <div class="total-row"><span>Total:</span> <span id="total-price">$0</span></div>
            <button class="checkout-btn">COMPRAR AHORA</button>
        </div>
    </aside>

    <div id="cart-overlay" class="overlay" onclick="toggleCart(false)"></div>
    <script src="SCRIPT.js"></script>
</body>
</html>
